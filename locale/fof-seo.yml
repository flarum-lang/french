        added_heading: 'OK, j''ai ajouté le certificat SSL !'
        how_body: 'Pour les utilisateurs d''un hébergement web, la méthode la plus courante consiste à se connecter au panneau d''administration de l''hébergement, à accéder aux paramètres d''hébergement de votre site web, puis à cliquer sur « SSL ». Vous pouvez ensuite suivre les étapes indiquées pour ajouter un certificat SSL à votre site web. La plupart des hébergeurs prennent aujourd''hui en charge l''émetteur de certificats populaire {link}.'
        how_heading: 'Comment ajouter un certificat SSL à votre site web ?'
        intro_body: 'La sensibilisation à la sécurité et à la protection des données sur Internet ne cesse de croître. <b>Presque tous les</b> développeurs et propriétaires de sites web souhaitent que leur site soit sécurisé pour leurs visiteurs, afin que ceux-ci n''aient pas à craindre que leurs données soient compromises par des pirates informatiques ou des usurpateurs d''identité.'
        intro_heading: 'Pourquoi ai-je besoin d''une connexion sécurisée ?'
        no_ssl_body: 'Dans ce cas, vous pouvez désinstaller cette extension, car les moteurs de recherche <b> n''indexeront pas votre forum </b> ou le classeront bien en dessous des autres sites pour des raisons de sécurité.'
        no_ssl_heading: 'Et si je ne souhaite pas ajouter un certificat SSL ?'
        rankings_body: 'Lorsque vous ne disposez pas d''une connexion sécurisée vers votre site web, les moteurs de recherche classeront votre site bien plus bas que les autres, voire ne l''indexeront pas.'
        rankings_body_ssl: 'Lorsque vous disposez d''un certificat SSL, votre site web bénéficiera d''un meilleur classement et sera indexé.'
        rankings_heading: 'Moteurs de recherche {icon} connexions sécurisées'
        what_body: 'La plupart des gens connaissent <b>https</b>, utilisé pour les connexions sécurisées sous le nom de SSL : <i>Secure Sockets Layer</i>. Officiellement, son nom est TLS : <i>Transport Layer Security</i>. Cette méthode est utilisée pour établir une connexion sécurisée avec votre serveur web, ce qui empêchera les pirates ou d''autres serveurs web de se faire passer pour votre site web et garantira la sécurité de vos visiteurs. Si cela se produit, la connexion SSL sera interrompue et les navigateurs des visiteurs afficheront un message d''avertissement indiquant que le site n''est pas fiable.'
        what_heading: 'Qu''est-ce que SSL ou TLS ?'
