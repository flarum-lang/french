fof-sentry:
  admin:
    sections:
      backend_performance: 'Surveillance des performances du backend'
      backend_performance_help: 'Suivez les performances et le profilage du backend PHP. Définissez les fréquences d''échantillonnage pour contrôler la charge système.'
      database_monitoring: 'Surveillance des requêtes de base de données'
      database_monitoring_help: 'Surveiller les performances des requêtes de la base de données et détecter les requêtes lentes et les problèmes de type « N+1 ». Cette fonctionnalité n''est active que lorsque la surveillance des performances du backend est activée.'
      frontend_monitoring: 'Surveillance du frontend (JavaScript)'
      frontend_monitoring_help: 'Suivez les erreurs JavaScript et les performances du frontend. Notez que l''activation de certaines fonctionnalités augmente la taille du bundle.'
      general: 'Paramètres généraux'
      general_help: 'Configurez votre DSN Sentry et vos paramètres d''environnement.'
      user_context: 'Contexte utilisateur'
      user_context_help: 'Contrôlez les informations utilisateur transmises à Sentry avec les rapports d''erreur.'
    sentry_settings: 'Paramètres de Sentry'
    settings:
      db_n_plus_one_detection_help: 'Détectez automatiquement les problèmes liés aux requêtes N+1 en identifiant les schémas de requêtes répétitives. Les requêtes N+1 surviennent lorsque le code exécute plusieurs fois la même requête dans une boucle au lieu d''utiliser des jointures appropriées ou le chargement anticipé. Cela permet d''identifier les goulots d''étranglement importants en termes de performances.'
      db_n_plus_one_detection_label: 'Activer la détection des requêtes N+1'
      db_n_plus_one_threshold_help: 'Nombre de fois qu''un modèle de requête doit se répéter pour être signalé comme un problème N+1 potentiel. Niveaux de sensibilité : 5-10 (strict, peut générer des faux positifs), 10-20 (équilibré, recommandé) et 20+ (prudent, ne signale que les problèmes graves). Valeur par défaut : 10.'
      db_n_plus_one_threshold_label: 'Seuil de détection N+1'
      db_query_sample_rate_help: 'Pourcentage de requêtes de base de données à surveiller dans le cadre du suivi des performances (0-100 %). Niveaux d''impact : 100 % (surveillance de toutes les requêtes, visibilité maximale, surcharge plus importante), 50 % (surveillance de la moitié, équilibre), 10-25 % (surveillance d''un sous-ensemble, surcharge moindre, détecte tout de même les problèmes), 0 % (surveillance des requêtes lentes uniquement, surcharge minimale). Remarque : les requêtes lentes (au-dessus du seuil) sont TOUJOURS suivies, quel que soit ce paramètre. Recommandation : utilisez 10-25 % sur les sites à fort trafic afin de réduire l''impact sur les performances et les coûts liés aux données Sentry.'
      db_query_sample_rate_label: 'Fréquence d''échantillonnage de la requête'
      db_slow_query_threshold_help: 'Les requêtes dont la durée dépasse ce seuil (en millisecondes) sont signalées comme lentes et font l''objet d''un suivi automatique, quel que soit le taux d''échantillonnage. Niveaux de gravité : moyen (1 à 2 fois le seuil), élevé (2 à 5 fois le seuil) et critique (5 fois ou plus le seuil). Valeur par défaut : 1 000 ms (1 seconde). Réduisez cette valeur à 500 ms pour une détection plus stricte.'
      db_slow_query_threshold_label: 'Seuil de requête lente (en millisecondes)'
      db_track_bindings_help: 'Inclure les valeurs réelles des paramètres dans le suivi des requêtes (par exemple, « SELECT * FROM users WHERE id = 123 » au lieu de « SELECT * FROM users WHERE id = ? »). Avantages : identifiez les valeurs exactes à l''origine des requêtes lentes et repérez les schémas de données problématiques. Avertissement relatif à la sécurité et à la confidentialité : peut exposer des données utilisateur sensibles dans Sentry. Les mots de passe et les hachages (32 caractères hexadécimaux ou plus) sont automatiquement masqués. Les chaînes longues (100 caractères ou plus) sont tronquées. Vérifiez votre politique de confidentialité avant d''activer cette fonctionnalité. Recommandation : activez-la uniquement en environnement de préproduction/développement, désactivez-la en production.'
      db_track_bindings_label: 'Suivre les valeurs des paramètres de requête'
      dsn_backend_help: 'DSN distinct facultatif réservé exclusivement aux erreurs du backend (PHP). Utile pour utiliser un projet Sentry différent pour les erreurs du backend, pour acheminer les données via un Relay afin d''améliorer les performances, ou pour séparer le suivi des erreurs du frontend et du backend. Si ce paramètre n''est pas défini, le DSN principal indiqué ci-dessus sera utilisé pour les deux.'
      dsn_backend_label: 'Sentry DSN (backend uniquement)'
      dsn_help: 'Nom de la source de données Sentry : il s''agit de l''URL de connexion principale pour la notification des erreurs au niveau du frontend et du backend. Vous pouvez la trouver dans les paramètres de votre projet Sentry. Important : si vous utilisez un DSN Relay, désactivez l''option « User Feedback », car celle-ci nécessite un accès direct à Sentry.'
      dsn_label: 'Nom de la source de données (DSN) de Sentry'
      environment_help: 'Attribuez à tous les événements un nom d''environnement (par exemple, « production », « préparation », « développement »). Cela vous permet de filtrer les erreurs par environnement de déploiement et de définir des règles d''alerte différentes pour chaque environnement.'
      environment_label: 'Environnement de Sentry'
      javascript_console_help: 'Enregistrez les appels console.log, console.info, console.warn et console.error sous forme de fil d''Ariane. Visualisez la séquence d''événements ayant conduit à une erreur et déboguez les interactions utilisateur complexes. Remarque : cela augmente le volume de données. À utiliser avec parcimonie en production.'
      javascript_console_label: 'Enregistrer les messages de la console sous forme de fil d''Ariane'
      javascript_help: 'Enregistrez et signalez les erreurs JavaScript du frontend de votre forum à Sentry. Système de suivi des exceptions non gérées, des rejets de promesses, des erreurs de console et des défaillances réseau. Désactivez cette option si vous souhaitez uniquement suivre les erreurs du backend.'
      javascript_label: 'Activer le rapport d''erreurs JavaScript'
      javascript_replays_error_sample_rate: 'Fréquence d''échantillonnage de la relecture déclenchée par une erreur'
      javascript_replays_error_sample_rate_help: 'Pourcentage de la session à enregistrer uniquement lorsqu''une erreur se produit. Plus efficace que la relecture intégrale de la session : enregistre jusqu''à 1 minute avant l''erreur et continue jusqu''à la fin de la session. Idéal pour le débogage des problèmes en production. Taille du fichier : ajoute environ 150 Ko. Recommandation : utiliser une valeur comprise entre 10 et 25 % en production.'
      javascript_replays_session_sample_rate: 'Fréquence d''échantillonnage de la rediffusion de session'
      javascript_replays_session_sample_rate_help: 'Pourcentage des sessions utilisateur à enregistrer depuis le début. Enregistre les mouvements de souris, les clics, le défilement, la navigation et les interactions avec les formulaires (avec masquage des données personnelles). Observez précisément ce que les utilisateurs ont fait pour reproduire les bugs. Taille du fichier : ajoute environ 150 Ko. Recommandation : utilisez une valeur comprise entre 1 et 5 % en production en raison des coûts de stockage.'
      javascript_trace_sample_rate: 'Fréquence d''échantillonnage pour la surveillance des performances du frontend'
      javascript_trace_sample_rate_help: 'Pourcentage de chargements de pages à suivre (0 = désactivé, 100 = tout suivre). Permet de suivre les temps de chargement des pages, le chargement des ressources, les requêtes API et les temps de navigation. Taille du bundle : ajoute environ 30 Ko. Recommandation : utiliser une valeur comprise entre 10 et 25 % en production.'
      monitor_performance_help: 'Pourcentage de requêtes backend à tracer (0 = désactivé, 100 = tout tracer). Les traces de performances incluent le temps de requête/réponse, les requêtes de base de données et les temps de chargement des extensions. Recommandation : commencez par 10 à 25 % en production, et 100 % en environnement de préproduction. Des valeurs plus faibles réduisent le volume de données et les coûts liés à Sentry.'
      monitor_performance_label: 'Fréquence d''échantillonnage pour la surveillance des performances du backend'
      profile_rate_help: 'Pourcentage des transactions suivies à profiler (par rapport au taux de surveillance indiqué ci-dessus). Exemple : si la surveillance est de 10 % et le profilage de 50 %, alors 5 % de toutes les requêtes sont profilées. Le profilage fournit des données détaillées sur les performances au niveau des fonctions. Impact sur les performances : le profilage ajoute une surcharge et augmente le temps de réponse. Voir <a>le guide d''optimisation de Sentry</a>. {icon} <bold>Nécessite l''extension Excimer (Linux uniquement). Actuellement {icon}.</bold>'
      profile_rate_label: 'Fréquence d''échantillonnage pour le profilage du backend'
      send_user_emails_help: 'Lorsque cette option est activée, les adresses de courriel des utilisateurs sont incluses dans tous les événements Sentry afin de pouvoir les contacter et filtrer les erreurs. Remarque relative à la confidentialité : veuillez consulter votre politique de confidentialité avant d''activer cette option. L''identifiant utilisateur, le nom d''utilisateur et les groupes sont toujours inclus, quel que soit ce paramètre.'
      send_user_emails_label: 'Inclure les adresses de courriel des utilisateurs dans les rapports'
      user_feedback_help: 'Lorsque cette fonctionnalité est activée, les utilisateurs voient s''afficher un formulaire de retour d''information après avoir rencontré une erreur, ce qui leur permet de décrire ce qui s''est passé. Le formulaire est prérempli avec leur nom d''utilisateur, leur adresse de courriel (si cette option est activée) et leur appartenance à un groupe. Cela permet de créer un canal de communication direct avec les utilisateurs rencontrant des problèmes. Nécessite un DSN Sentry direct (et non un DSN de relais).'
      user_feedback_label: 'Activer la boîte de dialogue de commentaires de l''utilisateur'
