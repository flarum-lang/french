fof-sentry:
  admin:
    sections:
      backend_performance: 'Surveillance des performances du backend'
      backend_performance_help: 'Suivez les performances et le profilage du backend PHP. Définissez des taux d''échantillonnage pour contrôler la charge.'
      database_monitoring: 'Surveillance des requêtes de base de données'
      database_monitoring_help: 'Surveillez les performances des requêtes de base de données, détectez les requêtes lentes et les problèmes N+1. Actif uniquement lorsque la surveillance des performances du backend est activée.'
      frontend_monitoring: 'Surveillance du frontend (JavaScript)'
      frontend_monitoring_help: 'Suivez les erreurs JavaScript et les performances du frontend. Notez que l''activation de certaines fonctionnalités augmente la taille du bundle.'
      general: 'Paramètres généraux'
      general_help: 'Configurez votre DSN Sentry et vos paramètres d''environnement.'
      user_context: 'Contexte utilisateur'
      user_context_help: 'Contrôlez les informations utilisateur envoyées à Sentry avec les rapports d''erreurs.'
    sentry_settings: 'Paramètres de Sentry'
    settings:
      db_n_plus_one_detection_help: 'Détectez automatiquement les problèmes liés aux requêtes N+1 en suivant les modèles de requêtes répétées. Les requêtes N+1 se produisent lorsque le code exécute plusieurs fois la même requête dans une boucle au lieu d''utiliser des jointures appropriées ou le chargement anticipé. Permet d''identifier les goulots d''étranglement importants en matière de performances.'
      db_n_plus_one_detection_label: 'Activer la détection des requêtes N+1'
      db_n_plus_one_threshold_help: 'Nombre de fois qu''un modèle de requête doit se répéter pour être signalé comme un problème N+1 potentiel. Niveaux de sensibilité : 5-10 (agressif, peut générer des faux positifs), 10-20 (équilibré, recommandé) et 20+ (conservateur, ne signale que les problèmes graves). Valeur par défaut : 10.'
      db_n_plus_one_threshold_label: 'Seuil de détection N+1'
      db_query_sample_rate_help: 'Pourcentage de requêtes de base de données à suivre dans le cadre de la surveillance des performances (0-100 %). Niveaux d''impact : 100 % (suivi de toutes les requêtes, visibilité maximale, surcoût plus élevé), 50 % (suivi de la moitié, équilibré), 10-25 % (suivi d''un sous-ensemble, surcoût moindre, détecte tout de même les problèmes) et 0 % (suivi des requêtes lentes uniquement, surcoût minimal). Remarque : les requêtes lentes (au-dessus du seuil) sont TOUJOURS suivies, quel que soit ce paramètre. Recommandation : utilisez 10-25 % sur les sites à fort trafic afin de réduire l''impact sur les performances et les coûts liés aux données Sentry.'
      db_query_sample_rate_label: 'Taux d''échantillonnage des requêtes'
      db_slow_query_threshold_help: 'Les requêtes qui dépassent ce seuil (en millisecondes) sont signalées comme lentes et automatiquement suivies, quel que soit le taux d''échantillonnage. Niveaux de gravité : moyen (1 à 2 fois le seuil), élevé (2 à 5 fois le seuil) et critique (5 fois le seuil ou plus). Valeur par défaut : 1 000 ms (1 seconde). Réduisez cette valeur à 500 ms pour une détection plus agressive.'
      db_slow_query_threshold_label: 'Seuil de requête lente (en millisecondes)'
      db_track_bindings_help: 'Inclure les valeurs réelles des paramètres dans le suivi des requêtes (par exemple, « SELECT * FROM users WHERE id = 123 » au lieu de « SELECT * FROM users WHERE id = ? »). Avantages : voir les valeurs exactes à l''origine des requêtes lentes et identifier les modèles de données problématiques. Avertissement relatif à la sécurité et à la confidentialité : peut exposer des données utilisateur sensibles dans Sentry. Les mots de passe et les hachages (32 caractères hexadécimaux ou plus) sont automatiquement masqués. Les chaînes longues (100 caractères ou plus) sont tronquées. Vérifiez votre politique de confidentialité avant d''activer cette option. Recommandation : activez uniquement en phase de test ou de développement, désactivez en production.'
      db_track_bindings_label: 'Suivre les valeurs des paramètres de requête'
      dsn_backend_help: 'Ce DSN ne sera utilisé que pour les erreurs de l''application dorsale. Ceci est particulièrement utile dans le cas où vous souhaitez utiliser un projet différent pour les erreurs de l''application dorsale ou si vous souhaitez plutôt utiliser un relais pour envoyer les erreurs de l''application dorsale à Sentry (pour améliorer les performances par exemple).'
      dsn_backend_label: 'Sentry DSN (application dorsale uniquement)'
      dsn_help: 'Si vous utilisez un DSN relais comme DSN principal, ne cochez pas « Retour d''expérience des utilisateurs » car cela ne fonctionnera pas.'
      dsn_label: 'Nom de la source de données (DSN) de Sentry'
      environment_help: 'Marquez tous les événements avec un nom d''environnement (par exemple, « production », « préproduction » ou « développement »). Cela vous aide à filtrer les erreurs par environnement de déploiement et à définir différentes règles d''alerte pour chaque environnement.'
      environment_label: 'Environnement de Sentry'
      javascript_console_help: 'Enregistrez les appels console.log, console.info, console.warn et console.error sous forme de fils d''Ariane. Visualisez la séquence d''événements ayant conduit à une erreur et déboguez les interactions utilisateur complexes. Remarque : augmente le volume de données. À utiliser de manière sélective en production.'
      javascript_console_label: 'Capturer la console JavaScript'
      javascript_help: 'Capturez et signalez les erreurs JavaScript depuis l''interface publique de votre forum vers Sentry. Suivez les exceptions non interceptées, les rejets de promesses, les erreurs de console et les défaillances réseau. Désactivez cette option si vous souhaitez uniquement suivre les erreurs backend.'
      javascript_label: 'Signaler des erreurs JavaScript'
      javascript_replays_error_sample_rate: 'Taux de relecture des erreurs de l''application frontale (0 - 100)'
      javascript_replays_error_sample_rate_help: 'Le taux d''échantillonnage pour les rediffusions enregistrées lorsqu''une erreur se produit. Jusqu''à 1 minute avant, l''erreur sera enregistré et continuera jusqu''à la fin de la session. {br}✱ L''activation de n''importe quelle option de relecture augmente la taille du paquet d''environ 150 Ko.'
      javascript_replays_session_sample_rate: 'Taux de relecture des sessions de l''application frontale (0 - 100)'
      javascript_replays_session_sample_rate_help: 'La fréquence d''échantillonnage pour les rediffusions qui commencent à enregistrer immédiatement et durent toute la session de l''utilisateur. {br}✱ L''activation de n''importe quelle option de rediffusion augmente la taille du paquet d''environ 150 Ko.'
      javascript_trace_sample_rate: 'Taux de surveillance des performances de l''application frontale (0 - 100)'
      javascript_trace_sample_rate_help: 'Le taux d''échantillonnage pour toutes les transactions. {br}✱ L''activation de cette fonctionnalité augmente la taille des paquets d''environ 30 Ko.'
      monitor_performance_help: 'Pourcentage de requêtes backend à tracer (0 = désactivé, 100 = tout tracer). Les traces de performance incluent le temps de requête et de réponse, les requêtes de base de données et les temps de chargement des extensions. Recommandation : commencez par 10 à 25 % en production et 100 % en préproduction. Des valeurs plus faibles réduisent le volume de données et les coûts Sentry.'
      monitor_performance_label: 'Taux de surveillance des performances de l''application dorsale (0 - 100)'
      profile_rate_help: 'Pourcentage des transactions tracées à profiler (par rapport au taux de surveillance ci-dessus). Exemple : si la surveillance = 10 % et le profilage = 50 %, alors 5 % de toutes les requêtes sont profilées. Le profilage fournit des données détaillées sur les performances au niveau des fonctions. Impact sur les performances : le profilage ajoute une surcharge et augmente le temps de réponse. Consultez le <a>guide d''optimisation de Sentry</a>. {icon} <bold>Nécessite l''extension Excimer (Linux uniquement). Actuellement {icon}.</bold>'
      profile_rate_label: 'Taux de profilage de l''application dorsale (0 - 100)'
      send_user_emails_help: 'Lorsque cette option est activée, les adresses de courriel des utilisateurs sont incluses dans tous les événements Sentry afin de contacter les utilisateurs et de filtrer les erreurs. Confidentialité : consultez votre politique de confidentialité avant d''activer cette option. L''identifiant utilisateur, le nom d''utilisateur et les groupes sont toujours inclus, quel que soit ce paramètre.'
      send_user_emails_label: 'Inclure les adresses courriel des utilisateurs dans les rapports'
      user_feedback_help: 'Lorsque cette option est activée, les utilisateurs voient apparaître un formulaire de commentaires après avoir rencontré une erreur, ce qui leur permet de décrire ce qui s''est passé. Le formulaire est prérempli avec leur nom d''utilisateur, leur adresse de courriel (si activée) et leur appartenance à un groupe. Crée un canal de communication direct avec les utilisateurs rencontrant des problèmes. Nécessite un DNS Sentry direct (et non un relai DNS).'
      user_feedback_label: 'Retour d''expérience de l''utilisateur'
